name: Daily Automation

on:
  schedule:
    # Run daily at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run-gas-bill-splitting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run gas bill splitting
        env:
          YNAB_API_KEY: ${{ secrets.YNAB_API_KEY }}
          YNAB_ACCOUNT_ID: ${{ vars.YNAB_ACCOUNT_ID }}
          YNAB_GAS_CATEGORY_ID: ${{ vars.YNAB_GAS_CATEGORY_ID }}
          YNAB_REIMBURSEMENT_CATEGORY_ID: ${{ vars.YNAB_REIMBURSEMENT_CATEGORY_ID }}
          YNAB_CLEAN_COMMUNITY_SERVICE_CATEGORY_ID: ${{ vars.YNAB_CLEAN_COMMUNITY_SERVICE_CATEGORY_ID }}
          YNAB_STREET_SERVICE_CATEGORY_ID: ${{ vars.YNAB_STREET_SERVICE_CATEGORY_ID }}
          YNAB_DRAINAGE_SERVICE_CATEGORY_ID: ${{ vars.YNAB_DRAINAGE_SERVICE_CATEGORY_ID }}
          YNAB_SOLID_WASTE_SERVICES_CATEGORY_ID: ${{ vars.YNAB_SOLID_WASTE_SERVICES_CATEGORY_ID }}
          YNAB_WATER_CATEGORY_ID: ${{ vars.YNAB_WATER_CATEGORY_ID }}
          YNAB_ELECTRIC_CATEGORY_ID: ${{ vars.YNAB_ELECTRIC_CATEGORY_ID }}
          YNAB_WASTEWATER_CATEGORY_ID: ${{ vars.YNAB_WASTEWATER_CATEGORY_ID }}
          VENMO_ACCESS_TOKEN: ${{ secrets.VENMO_ACCESS_TOKEN }}
          VENMO_RECIPIENT_USER_ID: ${{ secrets.VENMO_RECIPIENT_USER_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          COA_UTILITIES_EMAIL: ${{ secrets.COA_UTILITIES_EMAIL }}
          COA_UTILITIES_PASSWORD: ${{ secrets.COA_UTILITIES_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TZ: ${{ vars.TZ }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DRY_RUN: 'false'
        run: bun src/index.ts gas

      - name: Upload gas-bill logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gas-bill-logs-${{ github.run_id }}
          path: logs/
          retention-days: 1

  run-utility-bill-splitting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install

      - name: Run utility bill splitting
        env:
          YNAB_API_KEY: ${{ secrets.YNAB_API_KEY }}
          YNAB_ACCOUNT_ID: ${{ vars.YNAB_ACCOUNT_ID }}
          YNAB_GAS_CATEGORY_ID: ${{ vars.YNAB_GAS_CATEGORY_ID }}
          YNAB_REIMBURSEMENT_CATEGORY_ID: ${{ vars.YNAB_REIMBURSEMENT_CATEGORY_ID }}
          YNAB_CLEAN_COMMUNITY_SERVICE_CATEGORY_ID: ${{ vars.YNAB_CLEAN_COMMUNITY_SERVICE_CATEGORY_ID }}
          YNAB_STREET_SERVICE_CATEGORY_ID: ${{ vars.YNAB_STREET_SERVICE_CATEGORY_ID }}
          YNAB_DRAINAGE_SERVICE_CATEGORY_ID: ${{ vars.YNAB_DRAINAGE_SERVICE_CATEGORY_ID }}
          YNAB_SOLID_WASTE_SERVICES_CATEGORY_ID: ${{ vars.YNAB_SOLID_WASTE_SERVICES_CATEGORY_ID }}
          YNAB_WATER_CATEGORY_ID: ${{ vars.YNAB_WATER_CATEGORY_ID }}
          YNAB_ELECTRIC_CATEGORY_ID: ${{ vars.YNAB_ELECTRIC_CATEGORY_ID }}
          YNAB_WASTEWATER_CATEGORY_ID: ${{ vars.YNAB_WASTEWATER_CATEGORY_ID }}
          VENMO_ACCESS_TOKEN: ${{ secrets.VENMO_ACCESS_TOKEN }}
          VENMO_RECIPIENT_USER_ID: ${{ secrets.VENMO_RECIPIENT_USER_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          COA_UTILITIES_EMAIL: ${{ secrets.COA_UTILITIES_EMAIL }}
          COA_UTILITIES_PASSWORD: ${{ secrets.COA_UTILITIES_PASSWORD }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TZ: ${{ vars.TZ }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DRY_RUN: 'false'
        run: bun src/index.ts utilities

      - name: Upload utility-bill logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: utility-bill-logs-${{ github.run_id }}
          path: logs/
          retention-days: 1
